<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Game - 2 Players</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
            font-size: 2.5rem;
        }

        #gameContainer {
            position: relative;
        }

        canvas {
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 20px rgba(0, 255, 255, 0.1);
            background: #000;
        }

        #controls {
            margin-top: 20px;
            display: flex;
            gap: 60px;
            font-size: 0.9rem;
        }

        .player-controls {
            text-align: center;
        }

        .player-controls h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .player-controls p {
            margin: 5px 0;
            opacity: 0.8;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #ff00ff;
            text-align: center;
            display: none;
            box-shadow: 0 0 30px #ff00ff;
        }

        #gameOver h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        #gameOver button {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        #gameOver button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        #score {
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .player1-color {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .player2-color {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>
    <h1>TRON GAME</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameOver">
            <h2 id="winnerText">Player 1 Wins!</h2>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>
    <div id="controls">
        <div class="player-controls">
            <h3 class="player1-color">Player 1 (Cyan)</h3>
            <p>W - Turn Left</p>
            <p>D - Turn Right</p>
        </div>
        <div class="player-controls">
            <h3 class="player2-color">Player 2 (Magenta)</h3>
            <p>↑ - Turn Left</p>
            <p>→ - Turn Right</p>
        </div>
    </div>
    <div id="score">
        <span class="player1-color">Player 1: <span id="score1">0</span></span>
        <span style="margin: 0 30px;">|</span>
        <span class="player2-color">Player 2: <span id="score2">0</span></span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOver');
        const winnerText = document.getElementById('winnerText');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');

        // Game settings
        const TRAIL_DURATION = 5000; // Trail disappears after 5 seconds
        const PLAYER_SPEED = 3;
        const PLAYER_SIZE = 8;

        // Game state
        let gameRunning = false;
        let scores = { player1: 0, player2: 0 };

        // Direction vectors (up, right, down, left)
        const directions = [
            { x: 0, y: -1 },  // 0: up
            { x: 1, y: 0 },   // 1: right
            { x: 0, y: 1 },   // 2: down
            { x: -1, y: 0 }   // 3: left
        ];

        class Player {
            constructor(x, y, direction, color, name) {
                this.x = x;
                this.y = y;
                this.direction = direction; // 0-3 index in directions array
                this.color = color;
                this.name = name;
                this.alive = true;
                this.trail = [];
                this.lastTrailTime = 0;
            }

            turnLeft() {
                this.direction = (this.direction + 3) % 4;
            }

            turnRight() {
                this.direction = (this.direction + 1) % 4;
            }

            move() {
                if (!this.alive) return;

                const dir = directions[this.direction];
                this.x += dir.x * PLAYER_SPEED;
                this.y += dir.y * PLAYER_SPEED;

                // Add trail point
                const now = Date.now();
                this.trail.push({
                    x: this.x,
                    y: this.y,
                    time: now
                });

                // Remove expired trail points
                this.trail = this.trail.filter(point => now - point.time < TRAIL_DURATION);
            }

            draw() {
                if (!this.alive) return;

                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = PLAYER_SIZE;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Draw player head
                ctx.beginPath();
                ctx.arc(this.x, this.y, PLAYER_SIZE / 2 + 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            checkCollision(otherPlayer) {
                if (!this.alive) return false;

                // Check wall collision
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    return true;
                }

                // Check collision with own trail
                for (let i = 0; i < this.trail.length - 10; i++) {
                    if (this.checkPointCollision(this.trail[i])) {
                        return true;
                    }
                }

                // Check collision with other player's trail
                for (const point of otherPlayer.trail) {
                    if (this.checkPointCollision(point)) {
                        return true;
                    }
                }

                return false;
            }

            checkPointCollision(point) {
                const dx = this.x - point.x;
                const dy = this.y - point.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return distance < PLAYER_SIZE;
            }
        }

        let player1, player2;

        function initGame() {
            // Initialize players on opposite sides
            player1 = new Player(
                canvas.width * 0.25,
                canvas.height / 2,
                1, // facing right
                '#00ffff',
                'Player 1'
            );

            player2 = new Player(
                canvas.width * 0.75,
                canvas.height / 2,
                3, // facing left
                '#ff00ff',
                'Player 2'
            );

            gameRunning = true;
            gameOverScreen.style.display = 'none';
        }

        function update() {
            if (!gameRunning) return;

            player1.move();
            player2.move();

            // Check collisions
            const player1Died = player1.checkCollision(player2);
            const player2Died = player2.checkCollision(player1);

            if (player1Died && player2Died) {
                // Both died - it's a draw
                endGame('Draw!');
            } else if (player1Died) {
                player1.alive = false;
                scores.player2++;
                score2El.textContent = scores.player2;
                endGame('Player 2 Wins!');
            } else if (player2Died) {
                player2.alive = false;
                scores.player1++;
                score1El.textContent = scores.player1;
                endGame('Player 1 Wins!');
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines for effect
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw players
            player1.draw();
            player2.draw();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame(message) {
            gameRunning = false;
            winnerText.textContent = message;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            initGame();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            // Player 1 controls: W (left), D (right)
            if (e.key === 'w' || e.key === 'W') {
                player1.turnLeft();
            } else if (e.key === 'd' || e.key === 'D') {
                player1.turnRight();
            }

            // Player 2 controls: Arrow Up (left), Arrow Right (right)
            if (e.key === 'ArrowUp') {
                player2.turnLeft();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                player2.turnRight();
                e.preventDefault();
            }
        });

        // Start the game
        initGame();
        gameLoop();
    </script>
</body>
</html>
